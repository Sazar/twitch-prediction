<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Twitch Prediction Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<div id="prediction-widget" class="widget hidden">

  <!-- Header -->
  <div class="widget-header">
    <span class="lbl">PRÉDICTION</span>
    <span class="title" id="prediction-title">Qui va gagner ?</span>
    <div class="header-right">
      <span class="timer" id="timer-display">60s</span>
      <span class="status" id="status-badge">EN COURS</span>
    </div>
  </div>

  <!-- Corps : deux options + barre unifiée -->
  <div class="widget-body">

    <!-- Rang des options côte à côte -->
    <div class="options-row">

      <div class="option" id="option-1">
        <div class="opt-top">
          <span class="dot c1"></span>
          <span class="opt-name" id="opt-1-name">Option A</span>
          <span class="opt-badge" id="opt-1-badge"></span>
        </div>
        <div class="opt-bottom">
          <span class="opt-pct" id="opt-1-pct">50%</span>
          <span class="opt-pts" id="opt-1-pts">0 pts</span>
          <span class="opt-users" id="opt-1-users">0 <svg width="9" height="9" viewBox="0 0 24 24" fill="none"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2.5"/></svg></span>
        </div>
      </div>

      <div class="option right" id="option-2">
        <div class="opt-top right">
          <span class="opt-badge" id="opt-2-badge"></span>
          <span class="opt-name" id="opt-2-name">Option B</span>
          <span class="dot c2"></span>
        </div>
        <div class="opt-bottom right">
          <span class="opt-users" id="opt-2-users">0 <svg width="9" height="9" viewBox="0 0 24 24" fill="none"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2.5"/></svg></span>
          <span class="opt-pts" id="opt-2-pts">0 pts</span>
          <span class="opt-pct" id="opt-2-pct">50%</span>
        </div>
      </div>

    </div>

    <!-- Barre unifiée split -->
    <div class="split-bar">
      <div class="bar-left"  id="bar-left"  style="width:50%"></div>
      <div class="bar-right" id="bar-right"></div>
    </div>

  </div>

  <!-- Footer -->
  <div class="widget-footer">
    <span id="total-pts">0</span> pts au total
    <span class="sep">·</span>
    <span id="total-users">0</span> participants
  </div>

</div>

</body>
</html>
