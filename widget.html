<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Twitch Prediction Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<div id="prediction-widget" class="widget hidden">

  <!-- Header : label + titre + statut + timer -->
  <div class="widget-header">
    <div class="header-left">
      <span class="lbl-prediction">PRÉDICTION</span>
      <span class="prediction-title" id="prediction-title">Qui va gagner ?</span>
    </div>
    <div class="header-right">
      <span class="timer" id="timer-display">60s</span>
      <span class="status" id="status-badge">EN COURS</span>
    </div>
  </div>

  <!-- Barre de progression unifiée (split bleu|violet) -->
  <div class="split-bar-wrap">
    <div class="split-bar-left"  id="split-left"  style="width:50%"></div>
    <div class="split-bar-right" id="split-right" style="width:50%"></div>
  </div>

  <!-- Option 1 -->
  <div class="option" id="option-1">
    <div class="opt-row">
      <span class="dot c1"></span>
      <span class="opt-name" id="opt-1-name">Option A</span>
      <span class="opt-pct"  id="opt-1-pct">50%</span>
    </div>
    <div class="opt-meta">
      <span class="opt-pts"  id="opt-1-pts">0 pts</span>
      <span class="opt-sep">·</span>
      <span class="opt-users" id="opt-1-users">0 votants</span>
      <span class="opt-badge" id="opt-1-badge"></span>
    </div>
  </div>

  <!-- Diviseur interne -->
  <div class="inner-sep"></div>

  <!-- Option 2 -->
  <div class="option" id="option-2">
    <div class="opt-row">
      <span class="dot c2"></span>
      <span class="opt-name" id="opt-2-name">Option B</span>
      <span class="opt-pct"  id="opt-2-pct">50%</span>
    </div>
    <div class="opt-meta">
      <span class="opt-pts"  id="opt-2-pts">0 pts</span>
      <span class="opt-sep">·</span>
      <span class="opt-users" id="opt-2-users">0 votants</span>
      <span class="opt-badge" id="opt-2-badge"></span>
    </div>
  </div>

  <!-- Footer -->
  <div class="widget-footer">
    <span id="total-pts">0</span> pts
    <span class="foot-sep">·</span>
    <span id="total-users">0</span> participants
  </div>

</div>

</body>
</html>
